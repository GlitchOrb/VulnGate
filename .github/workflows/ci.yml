name: CI

on:
  push:
  pull_request:

jobs:
  lint-test:
    name: Lint and Test (Ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Check formatting
        run: |
          FILES="$(find . -type f -name '*.go' -not -path './vendor/*' -not -path './.tools/*')"
          UNFORMATTED="$(gofmt -l $FILES)"
          if [ -n "$UNFORMATTED" ]; then
            echo "gofmt check failed"
            echo "$UNFORMATTED"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build Linux binary
        run: go build ./cmd/vulngate

      - name: Build Linux runtime eBPF agent
        run: GOOS=linux GOARCH=amd64 go build ./runtime-ebpf/agent

      - name: Build Linux graph service
        run: GOOS=linux GOARCH=amd64 go build ./services/graph/cmd/graphd

  build-artifacts:
    name: Build Artifacts
    runs-on: ubuntu-latest
    needs: lint-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          EXT=""
          if [ "$GOOS" = "windows" ]; then
            EXT=".exe"
          fi
          BIN="dist/vulngate-${GOOS}-${GOARCH}${EXT}"
          go build -o "$BIN" ./cmd/vulngate

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vulngate-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
