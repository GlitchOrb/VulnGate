name: VulnGate SARIF Scan

on:
  push:
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  vulngate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build VulnGate
        run: |
          mkdir -p bin
          go build -o ./bin/vulngate ./cmd/vulngate

      - name: Init and import local DB
        run: |
          ./bin/vulngate db init --db ./vulngate.db
          ./bin/vulngate db import --db ./vulngate.db --source ./examples/vulndb/osv

      - name: Run scan (capture policy result, fail only on tool errors)
        id: scan
        run: |
          set +e
          ./bin/vulngate scan --db ./vulngate.db . > results.sarif
          SCAN_EXIT=$?
          echo "scan_exit=${SCAN_EXIT}" >> "$GITHUB_OUTPUT"
          if [ "$SCAN_EXIT" -eq 2 ]; then
            echo "Tool error"
            exit 2
          fi
          exit 0

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif

      - name: Enforce policy gate
        if: steps.scan.outputs.scan_exit == '1'
        run: |
          echo "VulnGate policy gate failed"
          exit 1
